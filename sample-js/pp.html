<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 22px;
      color: #333;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      margin-top: 15px;
      padding: 12px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.3s;
    }
    button:hover {
      background: #45a049;
    }
    #qrcode {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>QR Code Generator</h1>
    <input id="name" placeholder="Full Name">
    <input id="id" placeholder="ID No">
    <input id="course" placeholder="Course">
    <button onclick="generateQR()">Generate QR Code</button>
    <div id="qrcode"></div>
  </div>

  <script>
    function generateQR() {
      let text = 
        "Name: " + document.getElementById("name").value + "\n" +
        "ID: " + document.getElementById("id").value + "\n" +
        "Course: " + document.getElementById("course").value;

      document.getElementById("qrcode").innerHTML = ""; // clear old QR
      new QRCode(document.getElementById("qrcode"), {
        text: text,
        width: 200,
        height: 200
      });
    }
  </script>
</body>
</html>
